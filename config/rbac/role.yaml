---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vertical-pod-autoscaler-operator
rules:
# VerticalPodAutoscalerController CRD management
- apiGroups:
  - autoscaling.openshift.io
  resources:
  - verticalpodautoscalercontrollers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoscaling.openshift.io
  resources:
  - verticalpodautoscalercontrollers/finalizers
  verbs:
  - update
- apiGroups:
  - autoscaling.openshift.io
  resources:
  - verticalpodautoscalercontrollers/status
  verbs:
  - get
  - patch
  - update

# Deployment management (operator creates VPA component deployments)
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

# Service management (webhook service)
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - get
  - list
  - patch
  - update

# ConfigMap management (CA cert configmap)
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - get
  - list
  - patch
  - update

# Event recording
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch

# NetworkPolicy management
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
